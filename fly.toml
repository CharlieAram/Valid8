app = "valid8-app"
primary_region = "ams"

[build]

[env]
  PORT = "3000"
  DATABASE_PATH = "/data/valid8.db"
  BASE_URL = "https://valid8.alexanderremmerie.com"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "120s"
    method = "GET"
    path = "/api/health"

[mounts]
  source = "valid8_data"
  destination = "/data"
