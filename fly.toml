app = "valid8"
primary_region = "ams"

[build]

[env]
  PORT = "3000"
  DATABASE_PATH = "/data/valid8.db"
  BASE_URL = "https://valid8.alexanderremmerie.com"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "valid8_data"
  destination = "/data"
